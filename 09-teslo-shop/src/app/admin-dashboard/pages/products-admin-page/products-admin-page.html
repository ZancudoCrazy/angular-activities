<h1 class="text-2xl font-bold">Listados de productos</h1>
<h3>Total de productos
    <span class="text-accent">{{productsResource.value()?.count}}</span>
</h3>
<div class="divider"></div>

<div class="flex gap-2 items-center h-20">
    <app-pagination 
    [currentPage]="currentPage()"
    [pages]="productsResource.value()?.pages || 0"/>

    <select
        class="select select-bordered w-32" 
        (change)="changeLimit(+limit.value)"
        #limit
        >
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
        <option value="100">100</option> 
    </select>
    <div class="flex flex-1"></div>
    <button class="btn btn-primary"
        routerLink="/admin/products/new">
        Nuevo producto
    </button>
</div>
@if( productsResource.hasValue() ){

    <product-table [products]="productsResource.value().products"/>

}
